<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>CodeLens AI</title>
    <script>
      // Apply theme before React renders to prevent flash.
      // Only set the `data-theme` attribute; avoid forcing inline styles
      // so the CSS variables in App.css control the appearance.
      (function() {
        const theme = localStorage.getItem('codelens-theme') || 'dark';
        if (document.documentElement) {
          document.documentElement.setAttribute('data-theme', theme);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
