worker_processes 1;
events { worker_connections 1024; }
http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  resolver 127.0.0.11 valid=10s;
  resolver_timeout 5s;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 5000;
    server_name localhost;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_buffers 8 16k;
    proxy_buffer_size 32k;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location /api/auth/ {
      proxy_pass http://auth-service:5000;
    }

    location /api/github/auth/ {
      proxy_pass http://github-auth-service:5000;
    }

    location /api/github/pr/ {
      proxy_pass http://github-pr-service:5000;
    }

    location /api/github/files/ {
      proxy_pass http://github-filebrowser-service:5000;
    }

    location /api/review/ {
      proxy_pass http://review-service:5000;
    }

    location /api/review/re-review/ {
      proxy_pass http://review-service:5000;
    }

    location /api/workspace/ {
      proxy_pass http://workspace-service:5000;
    }

    location /api/socratic/ {
      proxy_pass http://socratic-service:5000;
    }

    location /api/history/ {
      proxy_pass http://history-service:5000;
    }

    location /api/settings/ {
      proxy_pass http://settings-service:5000;
    }

    location /api/jobs/ {
      proxy_pass http://job-service:5000;
    }

    location /api/dashboard/ {
      proxy_pass http://dashboard-service:5000;
    }

    location /api/notifications/ {
      proxy_pass http://notification-service:5000;
    }

    location /health {
      proxy_pass http://auth-service:5000/api/health;
    }

    location / {
      return 404;
    }
  }
}
